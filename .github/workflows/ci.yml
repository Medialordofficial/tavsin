name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SOLANA_VERSION: "2.1.21"
  ANCHOR_VERSION: "0.32.1"
  NODE_VERSION: "22"

jobs:
  app-build:
    name: app — lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install
        working-directory: app
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      - name: Lint
        working-directory: app
        run: npm run lint
      - name: Build
        working-directory: app
        env:
          NEXT_PUBLIC_TAVSIN_PROGRAM_ID: 2VzG2545ksX8cUSggRxQ6DUpDdFb1q9vkZwFftvWcbFy
          NEXT_PUBLIC_SOLANA_CLUSTER: devnet
        run: npm run build

  sdk-build:
    name: sdk — typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install
        working-directory: sdk
        run: npm install
      - name: Build
        working-directory: sdk
        run: npm run build

  examples-typecheck:
    name: examples — typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npm run typecheck:sample-sdk

  anchor-build:
    name: program — anchor build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked || \
          npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}
      - name: Anchor build
        run: anchor build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tavsin-program
          path: |
            target/deploy/tavsin.so
            target/idl/tavsin.json
          if-no-files-found: error
          retention-days: 7
